---
name: CI Pipeline

on:
  pull_request:
  push:
    branches:
      - main

defaults:
  run:
    working-directory: ${{ github.event.repository.name }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          path: ${{ github.event.repository.name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.x"

      - name: Install test dependencies
        run: uv sync --dev

      - name: Run yamllint
        run: uv run yamllint .

      - name: Run ansible-lint
        run: uv run ansible-lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # - ansible-version: "2.16"
          #   python-version: "3.12"
          # - ansible-version: "2.17"
          #   python-version: "3.12"
          - ansible-version: "2.18"
            python-version: "3.13"
          - ansible-version: "2.19"
            python-version: "3.13"
          - ansible-version: "2.20"
            python-version: "3.14"
        distro:
          - "debian13"
          - "rockylinux9"
          - "ubuntu2404"
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          path: ${{ github.event.repository.name }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          uv sync \
            --dev \
            --python python${{ matrix.python-version }} \
            --upgrade-package "ansible-core==${{ matrix.ansible-version }}.*"

      - name: Run tests
        run: uv run molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_DISTRO: ${{ matrix.distro }}
